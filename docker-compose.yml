version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: bdlab1_postgres
    environment:
      POSTGRES_DB: petshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./исходные данные:/csv_data

volumes:
  postgres_data:
